name: 記事自動生成

on:
  schedule:
    # 2026-05-13 00:30 JST（= 2026-05-12 15:30 UTC）に1回だけ実行
    - cron: '30 15 12 5 *'
  # GitHub Actions画面から手動実行も可能
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python 依存パッケージをインストール
        run: pip install requests python-dotenv openai

      - name: Node.js をセットアップ（Claude Code CLI 用）
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Claude Code CLI をインストール
        run: npm install -g @anthropic-ai/claude-code

      - name: ネタストックを生成
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tools/generate_topics.py

      - name: 記事を生成
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_OWNER: ${{ secrets.GH_OWNER }}
          GH_REPO: ${{ secrets.GH_REPO }}
        run: python tools/generate_article.py

      - name: 画像を生成
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GH_OWNER: ${{ secrets.GH_OWNER }}
          GH_REPO: ${{ secrets.GH_REPO }}
        run: python tools/generate_image.py

      - name: 生成した記事・画像をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ images/
          # 差分がある場合のみコミット（ネタストックなし等で変更がない場合はスキップ）
          git diff --cached --quiet || git commit -m "feat: 記事・画像自動生成 $(date +'%Y年%m月')"
          git push
